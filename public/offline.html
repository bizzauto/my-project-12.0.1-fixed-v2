<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - BizzAuto CRM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0A0F1C 0%, #1E293B 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon {
      width: 80px;
      height: 80px;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 40px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 12px;
    }
    p {
      color: #94A3B8;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .btn {
      display: inline-block;
      padding: 12px 24px;
      background: linear-gradient(135deg, #0D9488 0%, #14B8A6 100%);
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 500;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(13, 148, 136, 0.3);
    }
    .features {
      margin-top: 32px;
      text-align: left;
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 12px;
    }
    .features h3 {
      font-size: 14px;
      color: #94A3B8;
      margin-bottom: 12px;
    }
    .features ul {
      list-style: none;
    }
    .features li {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      color: #CBD5E1;
      font-size: 14px;
    }
    .features li::before {
      content: '✓';
      color: #14B8A6;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>Don't worry! Your data is saved locally. Connect to the internet to continue working.</p>
    <a href="/" class="btn">Try Again</a>
    <div class="features">
      <h3>What you can do offline:</h3>
      <ul>
        <li>View cached contacts and data</li>
        <li>Draft messages (will send when online)</li>
        <li>Access your dashboard</li>
        <li>Check cached reports</li>
      </ul>
    </div>
  </div>
</body>
</html>
