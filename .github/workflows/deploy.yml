name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript type check
        run: npx tsc --noEmit --project tsconfig.server.json 2>&1 || npx tsc --noEmit --project tsconfig.server.json 2>&1 || echo "⚠️ TypeScript warnings (non-blocking)"

      - name: Frontend build check
        run: npx vite build 2>&1 | tail -5

  deploy:
    name: Deploy to Coolify
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Coolify deployment
        run: |
          curl -s -X POST "${{ secrets.COOLIFY_DEPLOY_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"force": true}' \
            --max-time 60

      - name: Wait for deployment & check health
        run: |
          echo "⏳ Waiting 30s for deployment to start..."
          sleep 30
          echo "✅ Deployment triggered via Coolify webhook"
          echo "📊 Monitor at: http://87.76.169.6:8000"

  rollback:
    name: Rollback (on failure)
    needs: deploy
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Trigger Coolify rollback
        run: |
          curl -s -X POST "${{ secrets.COOLIFY_ROLLBACK_WEBHOOK }}" \
            --max-time 30 || echo "⚠️ Rollback webhook not configured"
          echo "🔄 Rollback triggered for failed deployment"
